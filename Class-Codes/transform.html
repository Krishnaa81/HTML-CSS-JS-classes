<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

            div{
                height: 70px;
                width: 200px;
                border: 1px solid;
                margin: 10px auto;
                background-color: chocolate;
                text-align: center;

            }

            #one{
                transform: rotate(45deg);    /*rotate type*/
            }

            #two{
                transform: translate(100px);
            }

            #three{
                transform: scale(2);
            }

            #four{
                transform: skew(45deg);
            }

            #five{
                transform: translate(100px,100px) rotate(60deg);
            }


    </style>
    
    
</head>
<body>
    
    <section>
        <div id="one">1</div>  
        <br>
        <br>
        <br>
    

        <div id="two">2</div>
        <br>
        <br>
        <br>
        
        <div id="three">3</div>
        <br>
        <br>
        <br>
        
        <div id="four">4</div>
        <br>
        <br>
        <br>
        
        <div id="five">5</div>
    </section>


</body>
</html>
